<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600" style="background:#333333">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#90FFB1"/>
    </marker>
  </defs>
  
  <!-- Zone backgrounds -->
  <rect x="12" y="80" width="280" height="480" fill="#7E60B1" fill-opacity="0.05" stroke="#7E60B1" stroke-opacity="0.2" rx="6"/>
  <rect x="708" y="80" width="280" height="480" fill="#3F6E6E" fill-opacity="0.05" stroke="#3F6E6E" stroke-opacity="0.2" rx="6"/>
  
  <!-- Zone labels -->
  <text x="152" y="70" font-family="Lato, sans-serif" font-size="12" font-weight="bold" fill="#7E60B1" text-anchor="middle">SOURCES</text>
  <text x="848" y="70" font-family="Lato, sans-serif" font-size="12" font-weight="bold" fill="#3F6E6E" text-anchor="middle">TARGETS</text>
  
  <!-- Title -->
  <text x="500" y="30" font-family="Lato, sans-serif" font-size="16" font-weight="bold" fill="#CCCCCC" text-anchor="middle">GlobalCable Value Dispatch Flow</text>
  
  <!-- Sources (left column) -->
  <rect x="32" y="100" width="240" height="40" fill="#282828" stroke="rgba(0,0,0,0.5)" rx="6"/>
  <text x="152" y="125" font-family="Lato, sans-serif" font-size="13" fill="#CCCCCC" text-anchor="middle">script setValue/setValueNormalised</text>
  
  <rect x="32" y="160" width="240" height="40" fill="#282828" stroke="rgba(0,0,0,0.5)" rx="6"/>
  <text x="152" y="185" font-family="Lato, sans-serif" font-size="13" fill="#CCCCCC" text-anchor="middle">scriptnode global_cable node</text>
  
  <rect x="32" y="220" width="240" height="40" fill="#282828" stroke="rgba(0,0,0,0.5)" rx="6"/>
  <text x="152" y="238" font-family="Lato, sans-serif" font-size="13" fill="#CCCCCC" text-anchor="middle">ScriptComponent with</text>
  <text x="152" y="252" font-family="Consolas, monospace" font-size="11" fill="#90FFB1" text-anchor="middle">processorId="GlobalCable"</text>
  
  <rect x="32" y="280" width="240" height="40" fill="#282828" stroke="rgba(0,0,0,0.5)" rx="6"/>
  <text x="152" y="305" font-family="Lato, sans-serif" font-size="13" fill="#CCCCCC" text-anchor="middle">GlobalModulatorContainer</text>
  
  <!-- Hub (center) -->
  <rect x="360" y="250" width="280" height="100" fill="#282828" stroke="#90FFB1" stroke-width="2" rx="6"/>
  <text x="500" y="280" font-family="Lato, sans-serif" font-size="14" font-weight="bold" fill="#90FFB1" text-anchor="middle">GlobalCable</text>
  <text x="500" y="305" font-family="Consolas, monospace" font-size="11" fill="#CCCCCC" text-anchor="middle">lastValue (0..1, clamped)</text>
  <text x="500" y="330" font-family="Lato, sans-serif" font-size="11" fill="#808080" text-anchor="middle">Fan-out to all registered targets</text>
  
  <!-- Targets (right column) -->
  <rect x="728" y="100" width="240" height="40" fill="#282828" stroke="rgba(0,0,0,0.5)" rx="6"/>
  <text x="848" y="118" font-family="Lato, sans-serif" font-size="13" fill="#CCCCCC" text-anchor="middle">Sync/Async script Callbacks</text>
  <text x="848" y="132" font-family="Consolas, monospace" font-size="10" fill="#808080" text-anchor="middle">(with inputRange conversion)</text>
  
  <rect x="728" y="160" width="240" height="40" fill="#282828" stroke="rgba(0,0,0,0.5)" rx="6"/>
  <text x="848" y="178" font-family="Lato, sans-serif" font-size="13" fill="#CCCCCC" text-anchor="middle">DataCallbacks</text>
  <text x="848" y="192" font-family="Consolas, monospace" font-size="10" fill="#808080" text-anchor="middle">(data channel only)</text>
  
  <rect x="728" y="220" width="240" height="40" fill="#282828" stroke="rgba(0,0,0,0.5)" rx="6"/>
  <text x="848" y="238" font-family="Lato, sans-serif" font-size="13" fill="#CCCCCC" text-anchor="middle">MacroCableTargets</text>
  <text x="848" y="252" font-family="Consolas, monospace" font-size="10" fill="#808080" text-anchor="middle">(0..1 -> 0..127 scaling)</text>
  
  <rect x="728" y="280" width="240" height="40" fill="#282828" stroke="rgba(0,0,0,0.5)" rx="6"/>
  <text x="848" y="298" font-family="Lato, sans-serif" font-size="13" fill="#CCCCCC" text-anchor="middle">ProcessorParameterTargets</text>
  <text x="848" y="312" font-family="Consolas, monospace" font-size="10" fill="#808080" text-anchor="middle">(target range + smoothing)</text>
  
  <rect x="728" y="340" width="240" height="40" fill="#282828" stroke="rgba(0,0,0,0.5)" rx="6"/>
  <text x="848" y="365" font-family="Lato, sans-serif" font-size="13" fill="#CCCCCC" text-anchor="middle">scriptnode global_cable nodes</text>
  
  <!-- Source connections to hub -->
  <line x1="272" y1="120" x2="360" y2="280" stroke="#90FFB1" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="272" y1="180" x2="360" y2="290" stroke="#90FFB1" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="272" y1="240" x2="360" y2="300" stroke="#90FFB1" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="272" y1="300" x2="360" y2="310" stroke="#90FFB1" stroke-width="1" marker-end="url(#arrow)"/>
  
  <!-- Hub connections to targets -->
  <line x1="640" y1="280" x2="728" y2="120" stroke="#90FFB1" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="640" y1="290" x2="728" y2="180" stroke="#90FFB1" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="640" y1="300" x2="728" y2="240" stroke="#90FFB1" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="640" y1="310" x2="728" y2="300" stroke="#90FFB1" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="640" y1="320" x2="728" y2="360" stroke="#90FFB1" stroke-width="1" marker-end="url(#arrow)"/>
  
  <!-- Feedback loop prevention annotation -->
  <rect x="320" y="400" width="360" height="60" fill="#222222" stroke="#444444" rx="4"/>
  <text x="500" y="420" font-family="Lato, sans-serif" font-size="11" font-weight="bold" fill="#FFBA00" text-anchor="middle">Feedback Loop Prevention</text>
  <text x="500" y="438" font-family="Lato, sans-serif" font-size="10" fill="#CCCCCC" text-anchor="middle">The source that sent the value is skipped during fan-out</text>
  <text x="500" y="452" font-family="Lato, sans-serif" font-size="10" fill="#CCCCCC" text-anchor="middle">to prevent circular routing</text>
</svg>