<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400" style="background:#333333">
  <defs>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#4E8E35"/>
    </marker>
    <marker id="arrow-teal" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#3F6E6E"/>
    </marker>
  </defs>
  
  <!-- Title -->
  <text x="450" y="30" font-family="Lato, sans-serif" font-size="16" font-weight="bold" fill="#CCCCCC" text-anchor="middle">Sync vs Async Callback Threading</text>
  
  <!-- Thread lanes -->
  <!-- Audio thread lane -->
  <rect x="120" y="80" width="760" height="80" fill="#4E8E35" fill-opacity="0.05" stroke="#4E8E35" stroke-opacity="0.2" rx="6"/>
  <text x="50" y="125" font-family="Lato, sans-serif" font-size="13" font-weight="bold" fill="#4E8E35">Audio Thread</text>
  
  <!-- UI thread lane -->
  <rect x="120" y="180" width="760" height="80" fill="#3F6E6E" fill-opacity="0.05" stroke="#3F6E6E" stroke-opacity="0.2" rx="6"/>
  <text x="50" y="225" font-family="Lato, sans-serif" font-size="13" font-weight="bold" fill="#3F6E6E">UI Thread</text>
  
  <!-- Timeline markers -->
  <text x="140" y="70" font-family="Lato, sans-serif" font-size="10" fill="#808080">Time →</text>
  
  <!-- Sync path (top) -->
  <circle cx="200" cy="120" r="6" fill="#90FFB1"/>
  <text x="200" y="105" font-family="Consolas, monospace" font-size="10" fill="#CCCCCC" text-anchor="middle">setValue()</text>
  
  <line x1="206" y1="120" x2="340" y2="120" stroke="#4E8E35" stroke-width="2" marker-end="url(#arrow-green)"/>
  <text x="270" y="110" font-family="Lato, sans-serif" font-size="9" fill="#4E8E35">immediate</text>
  
  <rect x="350" y="100" width="140" height="40" fill="#282828" stroke="#4E8E35" stroke-width="2" rx="6"/>
  <text x="420" y="118" font-family="Consolas, monospace" font-size="11" fill="#90FFB1" text-anchor="middle">inline function</text>
  <text x="420" y="132" font-family="Lato, sans-serif" font-size="10" fill="#CCCCCC" text-anchor="middle">callback(value)</text>
  
  <text x="520" y="125" font-family="Lato, sans-serif" font-size="10" font-weight="bold" fill="#4E8E35">SyncNotification</text>
  
  <!-- Async path (bottom) -->
  <circle cx="200" cy="220" r="6" fill="#90FFB1"/>
  <text x="200" y="205" font-family="Consolas, monospace" font-size="10" fill="#CCCCCC" text-anchor="middle">setValue()</text>
  
  <!-- Store in ModValue -->
  <line x1="206" y1="220" x2="280" y2="220" stroke="#3F6E6E" stroke-width="2"/>
  <rect x="290" y="200" width="100" height="40" fill="#282828" stroke="#3F6E6E" rx="6"/>
  <text x="340" y="215" font-family="Consolas, monospace" font-size="10" fill="#90FFB1" text-anchor="middle">ModValue</text>
  <text x="340" y="230" font-family="Lato, sans-serif" font-size="9" fill="#808080" text-anchor="middle">atomic store</text>
  
  <!-- setValue() calls coalescing -->
  <circle cx="440" cy="220" r="6" fill="#90FFB1"/>
  <text x="440" y="205" font-family="Consolas, monospace" font-size="10" fill="#CCCCCC" text-anchor="middle">setValue()</text>
  <line x1="446" y1="220" x2="520" y2="220" stroke="#3F6E6E" stroke-width="2"/>
  
  <circle cx="560" cy="220" r="6" fill="#90FFB1"/>
  <text x="560" y="205" font-family="Consolas, monospace" font-size="10" fill="#CCCCCC" text-anchor="middle">setValue()</text>
  <line x1="566" y1="220" x2="640" y2="220" stroke="#3F6E6E" stroke-width="2"/>
  
  <!-- Timer tick and callback -->
  <line x1="700" y1="220" x2="700" y2="180" stroke="#3F6E6E" stroke-width="2" stroke-dasharray="4,3"/>
  <text x="710" y="205" font-family="Lato, sans-serif" font-size="9" fill="#3F6E6E">timer tick</text>
  
  <rect x="720" y="200" width="140" height="40" fill="#282828" stroke="#3F6E6E" stroke-width="2" rx="6"/>
  <text x="790" y="218" font-family="Lato, sans-serif" font-size="11" fill="#CCCCCC" text-anchor="middle">callback(latest)</text>
  <text x="790" y="232" font-family="Lato, sans-serif" font-size="9" fill="#808080" text-anchor="middle">coalesced</text>
  
  <text x="760" y="175" font-family="Lato, sans-serif" font-size="10" font-weight="bold" fill="#3F6E6E">AsyncNotification</text>
  
  <!-- Annotation -->
  <rect x="120" y="290" width="760" height="70" fill="#222222" stroke="#444444" rx="4"/>
  <text x="130" y="310" font-family="Lato, sans-serif" font-size="11" font-weight="bold" fill="#FFBA00">Key Differences:</text>
  <text x="140" y="330" font-family="Lato, sans-serif" font-size="10" fill="#CCCCCC">• Sync: immediate execution, must use realtime-safe inline function, delivers every value</text>
  <text x="140" y="348" font-family="Lato, sans-serif" font-size="10" fill="#CCCCCC">• Async: UI thread polling at display refresh rate, coalesces values, intermediate values dropped</text>
</svg>