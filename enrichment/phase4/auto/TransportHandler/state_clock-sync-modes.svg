<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 650" width="1000" height="650">
  <defs>
    <!-- Arrow markers -->
    <marker id="arrow-accent" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#90FFB1"/>
    </marker>
    <marker id="arrow-dimmed" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#808080"/>
    </marker>
  </defs>
  
  <!-- Background -->
  <rect width="1000" height="650" fill="#333333"/>
  
  <!-- Title -->
  <text x="12" y="35" font-family="Lato, sans-serif" font-size="16" font-weight="bold" fill="#CCCCCC">Clock Sync Mode State Machine</text>
  
  <!-- Entry point -->
  <circle cx="500" cy="80" r="6" fill="#90FFB1"/>
  <line x1="500" y1="86" x2="500" y2="130" stroke="#90FFB1" stroke-width="2" marker-end="url(#arrow-accent)"/>
  
  <!-- State: Inactive -->
  <rect x="420" y="140" width="160" height="60" fill="#282828" stroke="#808080" stroke-width="2" rx="6"/>
  <text x="500" y="167" font-family="Lato, sans-serif" font-size="14" font-weight="bold" fill="#CCCCCC" text-anchor="middle">Inactive (0)</text>
  <text x="500" y="188" font-family="Lato, sans-serif" font-size="11" fill="#808080" text-anchor="middle">No clock processing</text>
  
  <!-- State: ExternalOnly -->
  <rect x="70" y="260" width="200" height="80" fill="#282828" stroke="#7E60B1" stroke-width="2" rx="6"/>
  <text x="170" y="292" font-family="Lato, sans-serif" font-size="14" font-weight="bold" fill="#CCCCCC" text-anchor="middle">ExternalOnly (1)</text>
  <text x="170" y="310" font-family="Lato, sans-serif" font-size="11" fill="#808080" text-anchor="middle">DAW transport only</text>
  <text x="170" y="326" font-family="Lato, sans-serif" font-size="11" fill="#808080" text-anchor="middle">Internal calls ignored</text>
  
  <!-- State: InternalOnly -->
  <rect x="310" y="260" width="200" height="80" fill="#282828" stroke="#4E8E35" stroke-width="2" rx="6"/>
  <text x="410" y="292" font-family="Lato, sans-serif" font-size="14" font-weight="bold" fill="#CCCCCC" text-anchor="middle">InternalOnly (2)</text>
  <text x="410" y="310" font-family="Lato, sans-serif" font-size="11" fill="#808080" text-anchor="middle">Script-driven clock only</text>
  <text x="410" y="326" font-family="Lato, sans-serif" font-size="11" fill="#808080" text-anchor="middle">DAW transport ignored</text>
  
  <!-- State: PreferInternal -->
  <rect x="550" y="260" width="200" height="80" fill="#282828" stroke="#4E8E35" stroke-width="2" rx="6"/>
  <text x="650" y="292" font-family="Lato, sans-serif" font-size="14" font-weight="bold" fill="#CCCCCC" text-anchor="middle">PreferInternal (3)</text>
  <text x="650" y="310" font-family="Lato, sans-serif" font-size="11" fill="#808080" text-anchor="middle">Internal wins conflicts</text>
  <text x="650" y="326" font-family="Lato, sans-serif" font-size="11" fill="#808080" text-anchor="middle">External when idle</text>
  
  <!-- State: PreferExternal -->
  <rect x="70" y="400" width="200" height="80" fill="#282828" stroke="#7E60B1" stroke-width="2" rx="6"/>
  <text x="170" y="432" font-family="Lato, sans-serif" font-size="14" font-weight="bold" fill="#CCCCCC" text-anchor="middle">PreferExternal (4)</text>
  <text x="170" y="450" font-family="Lato, sans-serif" font-size="11" fill="#808080" text-anchor="middle">DAW wins conflicts</text>
  <text x="170" y="466" font-family="Lato, sans-serif" font-size="11" fill="#808080" text-anchor="middle">Internal when DAW idle</text>
  
  <!-- State: SyncInternal -->
  <rect x="310" y="400" width="200" height="80" fill="#282828" stroke="#90FFB1" stroke-width="2" rx="6"/>
  <text x="410" y="432" font-family="Lato, sans-serif" font-size="14" font-weight="bold" fill="#CCCCCC" text-anchor="middle">SyncInternal (5)</text>
  <text x="410" y="450" font-family="Lato, sans-serif" font-size="11" fill="#808080" text-anchor="middle">Internal controls start/stop</text>
  <text x="410" y="466" font-family="Lato, sans-serif" font-size="11" fill="#808080" text-anchor="middle">PPQ syncs to DAW</text>
  
  <!-- Transitions from Inactive -->
  <line x1="480" y1="200" x2="170" y2="260" stroke="#808080" stroke-width="1" marker-end="url(#arrow-dimmed)"/>
  <text x="320" y="232" font-family="Consolas, monospace" font-size="11" fill="#808080">setSyncMode(1)</text>
  
  <line x1="500" y1="200" x2="410" y2="260" stroke="#808080" stroke-width="1" marker-end="url(#arrow-dimmed)"/>
  <text x="450" y="232" font-family="Consolas, monospace" font-size="11" fill="#808080">setSyncMode(2)</text>
  
  <line x1="520" y1="200" x2="650" y2="260" stroke="#808080" stroke-width="1" marker-end="url(#arrow-dimmed)"/>
  <text x="590" y="232" font-family="Consolas, monospace" font-size="11" fill="#808080">setSyncMode(3)</text>
  
  <!-- Transitions between active modes -->
  <path d="M 270 300 Q 290 370 310 420" stroke="#808080" stroke-width="1" fill="none" marker-end="url(#arrow-dimmed)"/>
  <text x="275" y="360" font-family="Consolas, monospace" font-size="10" fill="#808080">setSyncMode(4/5)</text>
  
  <path d="M 510 300 Q 490 370 470 410" stroke="#808080" stroke-width="1" fill="none" marker-end="url(#arrow-dimmed)"/>
  <text x="515" y="360" font-family="Consolas, monospace" font-size="10" fill="#808080">setSyncMode(4/5)</text>
  
  <line x1="270" y1="440" x2="310" y2="440" stroke="#808080" stroke-width="1" marker-end="url(#arrow-dimmed)"/>
  <text x="290" y="432" font-family="Consolas, monospace" font-size="10" fill="#808080" text-anchor="middle">switch</text>
  
  <!-- Return to Inactive (from any mode) -->
  <line x1="680" y1="180" x2="850" y2="180" stroke="#808080" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="850" y1="180" x2="850" y2="560" stroke="#808080" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="850" y1="560" x2="500" y2="560" stroke="#808080" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrow-dimmed)"/>
  <text x="680" y="575" font-family="Consolas, monospace" font-size="11" fill="#808080">setSyncMode(0) from any mode</text>
  
  <!-- Clock sources legend -->
  <text x="600" y="425" font-family="Lato, sans-serif" font-size="12" font-weight="bold" fill="#CCCCCC">Clock Sources:</text>
  
  <rect x="600" y="438" width="16" height="16" fill="none" stroke="#7E60B1" stroke-width="2" rx="2"/>
  <text x="624" y="451" font-family="Lato, sans-serif" font-size="11" fill="#CCCCCC">External (DAW)</text>
  
  <rect x="600" y="460" width="16" height="16" fill="none" stroke="#4E8E35" stroke-width="2" rx="2"/>
  <text x="624" y="473" font-family="Lato, sans-serif" font-size="11" fill="#CCCCCC">Internal (script)</text>
  
  <rect x="600" y="482" width="16" height="16" fill="none" stroke="#90FFB1" stroke-width="2" rx="2"/>
  <text x="624" y="495" font-family="Lato, sans-serif" font-size="11" fill="#CCCCCC">Hybrid (both)</text>
  
  <!-- Notes -->
  <text x="12" y="550" font-family="Lato, sans-serif" font-size="12" font-weight="bold" fill="#CCCCCC">Behavior Notes:</text>
  <text x="12" y="570" font-family="Lato, sans-serif" font-size="11" fill="#CCCCCC">• Inactive: All callbacks disabled, getPPQPos() returns 0</text>
  <text x="12" y="588" font-family="Lato, sans-serif" font-size="11" fill="#CCCCCC">• ExternalOnly: No internal playhead created; grid timing follows DAW PPQ</text>
  <text x="12" y="606" font-family="Lato, sans-serif" font-size="11" fill="#CCCCCC">• InternalOnly: allowExternalSync() returns false; uptime-based grid</text>
  <text x="12" y="624" font-family="Lato, sans-serif" font-size="11" fill="#CCCCCC">• PreferInternal/External: Handoff between sources; grid resync on transition</text>
</svg>
