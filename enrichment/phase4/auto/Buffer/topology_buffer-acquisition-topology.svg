<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 420">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#90FFB1"/>
    </marker>
  </defs>

  <rect x="16" y="72" width="280" height="316" fill="#7E60B1" fill-opacity="0.06" stroke="#7E60B1" stroke-opacity="0.25" rx="8"/>
  <rect x="352" y="132" width="296" height="156" fill="#161b22" stroke="#90FFB1" stroke-width="2" rx="8"/>
  <rect x="704" y="72" width="280" height="316" fill="#3F6E6E" fill-opacity="0.06" stroke="#3F6E6E" stroke-opacity="0.25" rx="8"/>

  <text x="500" y="34" font-family="Lato, sans-serif" font-size="16" font-weight="bold" fill="#CCCCCC" text-anchor="middle">Buffer Acquisition and Reference Paths</text>
  <text x="156" y="58" font-family="Lato, sans-serif" font-size="12" font-weight="bold" fill="#7E60B1" text-anchor="middle">SOURCES</text>
  <text x="844" y="58" font-family="Lato, sans-serif" font-size="12" font-weight="bold" fill="#3F6E6E" text-anchor="middle">RESULTS</text>

  <rect x="36" y="92" width="240" height="42" fill="#161b22" stroke="rgba(0,0,0,0.5)" rx="6"/>
  <text x="156" y="117" font-family="Lato, sans-serif" font-size="13" fill="#CCCCCC" text-anchor="middle">Buffer.create(numSamples)</text>

  <rect x="36" y="152" width="240" height="42" fill="#161b22" stroke="rgba(0,0,0,0.5)" rx="6"/>
  <text x="156" y="177" font-family="Lato, sans-serif" font-size="13" fill="#CCCCCC" text-anchor="middle">Buffer.referTo(source,...)</text>

  <rect x="36" y="212" width="240" height="42" fill="#161b22" stroke="rgba(0,0,0,0.5)" rx="6"/>
  <text x="156" y="237" font-family="Lato, sans-serif" font-size="13" fill="#CCCCCC" text-anchor="middle">source.getSlice(offset,...)</text>

  <rect x="36" y="272" width="240" height="42" fill="#161b22" stroke="rgba(0,0,0,0.5)" rx="6"/>
  <text x="156" y="297" font-family="Lato, sans-serif" font-size="12" fill="#CCCCCC" text-anchor="middle">Provider buffers (Display/Slider/Stack)</text>

  <text x="500" y="168" font-family="Lato, sans-serif" font-size="15" font-weight="bold" fill="#90FFB1" text-anchor="middle">Buffer Object</text>
  <text x="500" y="194" font-family="Consolas, monospace" font-size="11" fill="#CCCCCC" text-anchor="middle">fixed-size float sample storage</text>
  <text x="500" y="214" font-family="Consolas, monospace" font-size="11" fill="#CCCCCC" text-anchor="middle">owns memory or aliases external memory</text>
  <text x="500" y="246" font-family="Lato, sans-serif" font-size="11" fill="#808080" text-anchor="middle">in-place writes affect the referenced storage</text>

  <rect x="724" y="102" width="240" height="56" fill="#161b22" stroke="rgba(0,0,0,0.5)" rx="6"/>
  <text x="844" y="126" font-family="Lato, sans-serif" font-size="13" fill="#CCCCCC" text-anchor="middle">Owned Buffer</text>
  <text x="844" y="144" font-family="Consolas, monospace" font-size="10" fill="#808080" text-anchor="middle">independent storage</text>

  <rect x="724" y="182" width="240" height="56" fill="#161b22" stroke="rgba(0,0,0,0.5)" rx="6"/>
  <text x="844" y="206" font-family="Lato, sans-serif" font-size="13" fill="#CCCCCC" text-anchor="middle">Aliased Buffer View</text>
  <text x="844" y="224" font-family="Consolas, monospace" font-size="10" fill="#808080" text-anchor="middle">shared region of source data</text>

  <rect x="724" y="262" width="240" height="56" fill="#161b22" stroke="rgba(0,0,0,0.5)" rx="6"/>
  <text x="844" y="286" font-family="Lato, sans-serif" font-size="13" fill="#CCCCCC" text-anchor="middle">Provider-backed View</text>
  <text x="844" y="304" font-family="Consolas, monospace" font-size="10" fill="#808080" text-anchor="middle">external model owns memory</text>

  <line x1="276" y1="113" x2="352" y2="172" stroke="#90FFB1" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="276" y1="173" x2="352" y2="194" stroke="#90FFB1" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="276" y1="233" x2="352" y2="216" stroke="#90FFB1" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="276" y1="293" x2="352" y2="238" stroke="#90FFB1" stroke-width="1.2" marker-end="url(#arrow)"/>

  <line x1="648" y1="172" x2="724" y2="130" stroke="#90FFB1" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="648" y1="206" x2="724" y2="210" stroke="#90FFB1" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="648" y1="240" x2="724" y2="290" stroke="#90FFB1" stroke-width="1.2" marker-end="url(#arrow)"/>
</svg>
