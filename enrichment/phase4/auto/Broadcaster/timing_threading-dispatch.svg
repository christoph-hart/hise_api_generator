<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 360">
  <defs>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#4E8E35"/>
    </marker>
    <marker id="arrow-teal" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#3F6E6E"/>
    </marker>
    <marker id="arrow-orange" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#FFBA00"/>
    </marker>
  </defs>

  <!-- Calling thread lane -->
  <rect x="130" y="30" width="710" height="80" fill="#4E8E35" fill-opacity="0.04" stroke="#4E8E35" stroke-opacity="0.2" rx="6"/>
  <text x="60" y="75" font-family="Lato, sans-serif" font-size="12" font-weight="bold" fill="#4E8E35" text-anchor="middle">Calling</text>
  <text x="60" y="90" font-family="Lato, sans-serif" font-size="12" font-weight="bold" fill="#4E8E35" text-anchor="middle">Thread</text>

  <!-- Scripting thread lane -->
  <rect x="130" y="130" width="710" height="80" fill="#3F6E6E" fill-opacity="0.04" stroke="#3F6E6E" stroke-opacity="0.2" rx="6"/>
  <text x="60" y="175" font-family="Lato, sans-serif" font-size="12" font-weight="bold" fill="#3F6E6E" text-anchor="middle">Scripting</text>
  <text x="60" y="190" font-family="Lato, sans-serif" font-size="12" font-weight="bold" fill="#3F6E6E" text-anchor="middle">Thread</text>

  <!-- === SYNC PATH (top) === -->

  <!-- Event origin -->
  <circle cx="170" cy="70" r="6" fill="#90FFB1"/>
  <text x="170" y="55" font-family="Lato, sans-serif" font-size="11" fill="#CCCCCC" text-anchor="middle">event</text>

  <!-- Direct arrow to callback -->
  <line x1="176" y1="70" x2="290" y2="70" stroke="#4E8E35" stroke-width="2" marker-end="url(#arrow-green)"/>
  <text x="233" y="62" font-family="Lato, sans-serif" font-size="9" fill="#4E8E35" text-anchor="middle">immediate</text>

  <!-- Callback box -->
  <rect x="300" y="52" width="130" height="36" fill="#161b22" stroke="#4E8E35" stroke-width="1.5" rx="6"/>
  <text x="365" y="75" font-family="Consolas, monospace" font-size="12" fill="#90FFB1" text-anchor="middle">callback()</text>

  <!-- Label -->
  <text x="475" y="75" font-family="Lato, sans-serif" font-size="11" font-weight="bold" fill="#4E8E35">Synchronous</text>

  <!-- === ASYNC PATH (middle) === -->

  <!-- Three rapid events -->
  <circle cx="170" cy="170" r="5" fill="#90FFB1" opacity="0.35"/>
  <circle cx="220" cy="170" r="5" fill="#90FFB1" opacity="0.35"/>
  <circle cx="270" cy="170" r="8" fill="#90FFB1"/>

  <!-- Coalescing bracket -->
  <path d="M 165 155 L 165 150 L 275 150 L 275 155" fill="none" stroke="#808080" stroke-width="1"/>
  <text x="220" y="145" font-family="Lato, sans-serif" font-size="9" fill="#808080" text-anchor="middle">coalesced</text>

  <!-- Small X marks on dropped events -->
  <text x="170" y="190" font-family="Lato, sans-serif" font-size="9" fill="#BB3434" text-anchor="middle">x</text>
  <text x="220" y="190" font-family="Lato, sans-serif" font-size="9" fill="#BB3434" text-anchor="middle">x</text>

  <!-- Arrow from surviving event across to deferred boundary -->
  <line x1="278" y1="170" x2="430" y2="170" stroke="#3F6E6E" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Timer tick boundary -->
  <line x1="440" y1="135" x2="440" y2="205" stroke="#3F6E6E" stroke-width="1" stroke-dasharray="6,3"/>
  <text x="448" y="148" font-family="Lato, sans-serif" font-size="9" fill="#3F6E6E">deferred</text>

  <!-- Arrow to callback -->
  <line x1="450" y1="170" x2="530" y2="170" stroke="#3F6E6E" stroke-width="2" marker-end="url(#arrow-teal)"/>

  <!-- Callback box -->
  <rect x="540" y="152" width="130" height="36" fill="#161b22" stroke="#3F6E6E" stroke-width="1.5" rx="6"/>
  <text x="605" y="175" font-family="Consolas, monospace" font-size="12" fill="#90FFB1" text-anchor="middle">callback()</text>

  <!-- Label -->
  <text x="710" y="175" font-family="Lato, sans-serif" font-size="11" font-weight="bold" fill="#3F6E6E">Asynchronous</text>

  <!-- === QUEUE MODE (bottom) === -->
  <rect x="130" y="240" width="710" height="90" fill="#FFBA00" fill-opacity="0.03" stroke="#FFBA00" stroke-opacity="0.15" rx="6"/>
  <text x="60" y="285" font-family="Lato, sans-serif" font-size="12" font-weight="bold" fill="#FFBA00" text-anchor="middle">Queue</text>
  <text x="60" y="300" font-family="Lato, sans-serif" font-size="12" font-weight="bold" fill="#FFBA00" text-anchor="middle">Mode</text>

  <!-- Three events, all surviving -->
  <circle cx="170" cy="280" r="5" fill="#90FFB1"/>
  <circle cx="220" cy="280" r="5" fill="#90FFB1"/>
  <circle cx="270" cy="280" r="5" fill="#90FFB1"/>

  <!-- Orthogonal arrows: horizontal then vertical then horizontal to each callback box -->
  <path d="M 175 280 L 390 280 L 390 265 L 440 265" fill="none" stroke="#FFBA00" stroke-width="1" stroke-dasharray="4,3" opacity="0.6" marker-end="url(#arrow-orange)"/>
  <path d="M 225 280 L 400 280 L 400 285 L 440 285" fill="none" stroke="#FFBA00" stroke-width="1" stroke-dasharray="4,3" opacity="0.6" marker-end="url(#arrow-orange)"/>
  <path d="M 275 280 L 410 280 L 410 305 L 440 305" fill="none" stroke="#FFBA00" stroke-width="1" stroke-dasharray="4,3" opacity="0.6" marker-end="url(#arrow-orange)"/>

  <!-- Three callback boxes, stacked vertically -->
  <rect x="450" y="254" width="72" height="22" fill="#161b22" stroke="#FFBA00" stroke-width="1" stroke-opacity="0.5" rx="4"/>
  <text x="486" y="269" font-family="Consolas, monospace" font-size="9" fill="#CCCCCC" text-anchor="middle">cb(v1)</text>

  <rect x="450" y="274" width="72" height="22" fill="#161b22" stroke="#FFBA00" stroke-width="1" stroke-opacity="0.5" rx="4"/>
  <text x="486" y="289" font-family="Consolas, monospace" font-size="9" fill="#CCCCCC" text-anchor="middle">cb(v2)</text>

  <rect x="450" y="294" width="72" height="22" fill="#161b22" stroke="#FFBA00" stroke-width="1" stroke-opacity="0.5" rx="4"/>
  <text x="486" y="309" font-family="Consolas, monospace" font-size="9" fill="#CCCCCC" text-anchor="middle">cb(v3)</text>

  <!-- Label -->
  <text x="570" y="290" font-family="Lato, sans-serif" font-size="11" font-weight="bold" fill="#FFBA00">every value delivered</text>

</svg>
