<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 350 150" width="350" height="150">
  <defs>
    <marker id="arr" markerWidth="6" markerHeight="5" refX="5" refY="2.5" orient="auto">
      <polygon points="0 0, 6 2.5, 0 5" fill="#808080"/>
    </marker>
  </defs>

  <!-- Left: "this" rectangle (solid grey) -->
  <rect x="10" y="15" width="70" height="70" rx="3"
        fill="none" stroke="#808080" stroke-width="1"/>
  <text x="45" y="42" font-family="Lato, sans-serif" font-size="11"
        fill="#808080" text-anchor="middle">this</text>

  <!-- Left: "other" rectangle (dashed grey), partially overlapping -->
  <rect x="50" y="50" width="70" height="70" rx="3"
        fill="none" stroke="#808080" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="95" y="105" font-family="Lato, sans-serif" font-size="11"
        fill="#808080" text-anchor="middle">other</text>

  <!-- Arrow -->
  <line x1="133" y1="65" x2="157" y2="65"
        stroke="#808080" stroke-width="1" marker-end="url(#arr)"/>

  <!-- Right: ghost of "this" (dashed, dimmed) -->
  <rect x="175" y="15" width="70" height="70" rx="3"
        fill="none" stroke="#808080" stroke-width="1" stroke-dasharray="4,3" stroke-opacity="0.3"/>

  <!-- Right: ghost of "other" (dashed, dimmed) -->
  <rect x="215" y="50" width="70" height="70" rx="3"
        fill="none" stroke="#808080" stroke-width="1" stroke-dasharray="4,3" stroke-opacity="0.3"/>

  <!-- Right: union result (green) - bounding box of both -->
  <rect x="175" y="15" width="110" height="105" rx="3"
        fill="#90FFB1" fill-opacity="0.12" stroke="#90FFB1" stroke-width="1.5"/>
  <text x="230" y="74" font-family="Lato, sans-serif" font-size="11"
        fill="#90FFB1" text-anchor="middle">result</text>
</svg>
