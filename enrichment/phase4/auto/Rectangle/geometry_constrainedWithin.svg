<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 350 150" width="350" height="150">
  <defs>
    <marker id="arr" markerWidth="6" markerHeight="5" refX="5" refY="2.5" orient="auto">
      <polygon points="0 0, 6 2.5, 0 5" fill="#808080"/>
    </marker>
  </defs>

  <!-- Left: boundary "target" rectangle (dashed grey) -->
  <rect x="10" y="10" width="110" height="110" rx="3"
        fill="none" stroke="#808080" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="40" y="112" font-family="Lato, sans-serif" font-size="10"
        fill="#808080" text-anchor="middle">target</text>

  <!-- Left: "this" rectangle (solid grey), sticking out past right edge -->
  <rect x="60" y="25" width="80" height="50" rx="3"
        fill="none" stroke="#808080" stroke-width="1"/>
  <text x="100" y="54" font-family="Lato, sans-serif" font-size="11"
        fill="#808080" text-anchor="middle">rect</text>

  <!-- Arrow -->
  <line x1="148" y1="65" x2="172" y2="65"
        stroke="#808080" stroke-width="1" marker-end="url(#arr)"/>

  <!-- Right: boundary "target" (dashed grey) -->
  <rect x="185" y="10" width="110" height="110" rx="3"
        fill="none" stroke="#808080" stroke-width="1" stroke-dasharray="4,3" stroke-opacity="0.4"/>

  <!-- Right: ghost of original position (dashed, very dim) -->
  <rect x="235" y="25" width="80" height="50" rx="3"
        fill="none" stroke="#808080" stroke-width="1" stroke-dasharray="4,3" stroke-opacity="0.2"/>

  <!-- Right: constrained result (green), moved left to fit inside boundary -->
  <rect x="215" y="25" width="80" height="50" rx="3"
        fill="#90FFB1" fill-opacity="0.12" stroke="#90FFB1" stroke-width="1.5"/>
  <text x="255" y="54" font-family="Lato, sans-serif" font-size="11"
        fill="#90FFB1" text-anchor="middle">result</text>
</svg>
