<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 330 160" width="330" height="160">
  <defs>
    <marker id="arr" markerWidth="6" markerHeight="5" refX="5" refY="2.5" orient="auto">
      <polygon points="0 0, 6 2.5, 0 5" fill="#808080"/>
    </marker>
  </defs>

  <!-- Left: original rectangle -->
  <rect x="25" y="30" width="70" height="70" rx="3"
        fill="none" stroke="#808080" stroke-width="1"/>
  <text x="60" y="69" font-family="Lato, sans-serif" font-size="11"
        fill="#808080" text-anchor="middle">rect</text>

  <!-- Arrow -->
  <line x1="108" y1="65" x2="132" y2="65"
        stroke="#808080" stroke-width="1" marker-end="url(#arr)"/>

  <!-- Right: ghost of original (dashed, dimmed) -->
  <rect x="165" y="30" width="70" height="70" rx="3"
        fill="none" stroke="#808080" stroke-width="1" stroke-dasharray="4,3" stroke-opacity="0.4"/>

  <!-- Right: scaled result (green) - both position and size scaled by 1.5x -->
  <rect x="152" y="18" width="105" height="105" rx="3"
        fill="#90FFB1" fill-opacity="0.12" stroke="#90FFB1" stroke-width="1.5"/>
  <text x="204" y="60" font-family="Lato, sans-serif" font-size="11"
        fill="#90FFB1" text-anchor="middle">result</text>

  <!-- Origin marker -->
  <circle cx="152" cy="18" r="2" fill="#808080"/>
  <text x="140" y="10" font-family="Consolas, 'Courier New', monospace" font-size="9"
        fill="#808080" text-anchor="end">0,0</text>

  <!-- Scale factor label -->
  <text x="204" y="145" font-family="Consolas, 'Courier New', monospace" font-size="10"
        fill="#808080" text-anchor="middle">factor: 1.5x</text>
</svg>
