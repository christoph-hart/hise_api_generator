<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 290 150" width="290" height="150">
  <defs>
    <marker id="arr" markerWidth="6" markerHeight="5" refX="5" refY="2.5" orient="auto">
      <polygon points="0 0, 6 2.5, 0 5" fill="#808080"/>
    </marker>
  </defs>

  <!-- Left: original rectangle -->
  <rect x="15" y="15" width="80" height="80" rx="3"
        fill="none" stroke="#808080" stroke-width="1"/>
  <text x="55" y="59" font-family="Lato, sans-serif" font-size="11"
        fill="#808080" text-anchor="middle">rect</text>

  <!-- Arrow -->
  <line x1="108" y1="55" x2="132" y2="55"
        stroke="#808080" stroke-width="1" marker-end="url(#arr)"/>

  <!-- Right: ghost of original (dashed, dimmed) -->
  <rect x="150" y="15" width="80" height="80" rx="3"
        fill="none" stroke="#808080" stroke-width="1" stroke-dasharray="4,3" stroke-opacity="0.4"/>

  <!-- Right: result moved vertically (green) - same size -->
  <rect x="150" y="40" width="80" height="80" rx="3"
        fill="#90FFB1" fill-opacity="0.12" stroke="#90FFB1" stroke-width="1.5"/>
  <text x="190" y="84" font-family="Lato, sans-serif" font-size="11"
        fill="#90FFB1" text-anchor="middle">result</text>

  <!-- Dimension: new y position -->
  <line x1="237" y1="40" x2="247" y2="40" stroke="#90FFB1" stroke-width="1"/>
  <text x="260" y="44" font-family="Consolas, 'Courier New', monospace" font-size="10"
        fill="#808080">newY</text>
</svg>
