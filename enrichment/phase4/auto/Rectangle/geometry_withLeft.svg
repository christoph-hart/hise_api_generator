<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 140" width="300" height="140">
  <defs>
    <marker id="arr" markerWidth="6" markerHeight="5" refX="5" refY="2.5" orient="auto">
      <polygon points="0 0, 6 2.5, 0 5" fill="#808080"/>
    </marker>
  </defs>

  <!-- Left: original rectangle -->
  <rect x="25" y="15" width="80" height="100" rx="3"
        fill="none" stroke="#808080" stroke-width="1"/>
  <text x="65" y="70" font-family="Lato, sans-serif" font-size="11"
        fill="#808080" text-anchor="middle">rect</text>

  <!-- Arrow -->
  <line x1="118" y1="65" x2="142" y2="65"
        stroke="#808080" stroke-width="1" marker-end="url(#arr)"/>

  <!-- Right: ghost of original (dashed, dimmed) -->
  <rect x="160" y="15" width="80" height="100" rx="3"
        fill="none" stroke="#808080" stroke-width="1" stroke-dasharray="4,3" stroke-opacity="0.4"/>

  <!-- Right: result with left edge moved inward (green) - right edge stays at 240 -->
  <rect x="185" y="15" width="55" height="100" rx="3"
        fill="#90FFB1" fill-opacity="0.12" stroke="#90FFB1" stroke-width="1.5"/>
  <text x="212" y="70" font-family="Lato, sans-serif" font-size="11"
        fill="#90FFB1" text-anchor="middle">result</text>

  <!-- Dimension: new left position -->
  <line x1="185" y1="122" x2="185" y2="132" stroke="#90FFB1" stroke-width="1"/>
  <text x="185" y="140" font-family="Consolas, 'Courier New', monospace" font-size="10"
        fill="#808080" text-anchor="middle">newLeft</text>
</svg>
