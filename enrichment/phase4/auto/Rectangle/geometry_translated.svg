<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 150" width="300" height="150">
  <defs>
    <marker id="arr" markerWidth="6" markerHeight="5" refX="5" refY="2.5" orient="auto">
      <polygon points="0 0, 6 2.5, 0 5" fill="#808080"/>
    </marker>
    <marker id="arr-green" markerWidth="6" markerHeight="5" refX="5" refY="2.5" orient="auto">
      <polygon points="0 0, 6 2.5, 0 5" fill="#90FFB1"/>
    </marker>
  </defs>

  <!-- Left: original rectangle -->
  <rect x="15" y="20" width="80" height="80" rx="3"
        fill="none" stroke="#808080" stroke-width="1"/>
  <text x="55" y="64" font-family="Lato, sans-serif" font-size="11"
        fill="#808080" text-anchor="middle">rect</text>

  <!-- Arrow -->
  <line x1="108" y1="60" x2="132" y2="60"
        stroke="#808080" stroke-width="1" marker-end="url(#arr)"/>

  <!-- Right: ghost of original (dashed, dimmed) -->
  <rect x="150" y="20" width="80" height="80" rx="3"
        fill="none" stroke="#808080" stroke-width="1" stroke-dasharray="4,3" stroke-opacity="0.4"/>

  <!-- Right: translated result (green), offset right and down -->
  <rect x="175" y="40" width="80" height="80" rx="3"
        fill="#90FFB1" fill-opacity="0.12" stroke="#90FFB1" stroke-width="1.5"/>
  <text x="215" y="84" font-family="Lato, sans-serif" font-size="11"
        fill="#90FFB1" text-anchor="middle">result</text>

  <!-- Offset arrows showing deltaX and deltaY -->
  <line x1="152" y1="130" x2="177" y2="130"
        stroke="#808080" stroke-width="1" marker-end="url(#arr)"/>
  <text x="164" y="143" font-family="Consolas, 'Courier New', monospace" font-size="10"
        fill="#808080" text-anchor="middle">dx</text>

  <line x1="263" y1="22" x2="263" y2="42"
        stroke="#808080" stroke-width="1" marker-end="url(#arr)"/>
  <text x="276" y="36" font-family="Consolas, 'Courier New', monospace" font-size="10"
        fill="#808080">dy</text>
</svg>
