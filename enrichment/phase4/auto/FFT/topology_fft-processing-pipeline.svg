<svg xmlns="http://www.w3.org/2000/svg" width="760" height="380" viewBox="0 0 760 380">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#CCCCCC"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#90FFB1"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="380" y="24" fill="#808080" font-family="Lato, sans-serif" font-size="13" text-anchor="middle">FFT Processing Pipeline</text>

  <!-- Input Buffer -->
  <rect x="20" y="145" width="120" height="50" rx="6" fill="#161b22" stroke="#90FFB1" stroke-width="2"/>
  <text x="80" y="175" fill="#CCCCCC" font-family="Lato, sans-serif" font-size="13" font-weight="bold" text-anchor="middle">Input Buffer</text>

  <!-- Fork point -->
  <circle cx="180" cy="170" r="4" fill="#CCCCCC"/>
  <path d="M140,170 L176,170" stroke="#CCCCCC" stroke-width="1.5" marker-end="url(#arrow)" fill="none"/>

  <!-- === Spectrum2D Path (top) === -->
  <path d="M180,170 L180,80 L235,80" stroke="#CCCCCC" stroke-width="1" marker-end="url(#arrow)" fill="none" stroke-dasharray="4,3"/>

  <!-- Spectrum2D box -->
  <rect x="240" y="55" width="130" height="50" rx="6" fill="#161b22" stroke="rgba(0,0,0,0.5)" stroke-width="1"/>
  <text x="305" y="85" fill="#CCCCCC" font-family="Lato, sans-serif" font-size="13" font-weight="bold" text-anchor="middle">Spectrum2D</text>

  <!-- Spectrum Image output -->
  <path d="M370,80 L425,80" stroke="#CCCCCC" stroke-width="1" marker-end="url(#arrow)" fill="none" stroke-dasharray="4,3"/>
  <rect x="430" y="55" width="140" height="50" rx="6" fill="#161b22" stroke="#4E8E35" stroke-width="1"/>
  <text x="500" y="85" fill="#CCCCCC" font-family="Lato, sans-serif" font-size="13" font-weight="bold" text-anchor="middle">Spectrum Image</text>

  <!-- label -->
  <text x="305" y="48" fill="#808080" font-family="Consolas, 'Courier New', monospace" font-size="11" text-anchor="middle">setEnableSpectrum2D</text>

  <!-- === Callback Path (bottom) === -->
  <path d="M180,170 L180,240 L215,240" stroke="#CCCCCC" stroke-width="1.5" marker-end="url(#arrow)" fill="none"/>

  <!-- Window Function -->
  <rect x="220" y="215" width="110" height="50" rx="6" fill="#161b22" stroke="rgba(0,0,0,0.5)" stroke-width="1"/>
  <text x="275" y="245" fill="#CCCCCC" font-family="Lato, sans-serif" font-size="13" font-weight="bold" text-anchor="middle">Window</text>

  <!-- Forward FFT -->
  <path d="M330,240 L355,240" stroke="#CCCCCC" stroke-width="1.5" marker-end="url(#arrow)" fill="none"/>
  <rect x="360" y="215" width="110" height="50" rx="6" fill="#161b22" stroke="rgba(0,0,0,0.5)" stroke-width="1"/>
  <text x="415" y="245" fill="#CCCCCC" font-family="Lato, sans-serif" font-size="13" font-weight="bold" text-anchor="middle">Forward FFT</text>

  <!-- Magnitude Callback -->
  <path d="M470,230 L495,230" stroke="#CCCCCC" stroke-width="1.5" marker-end="url(#arrow)" fill="none"/>
  <rect x="500" y="195" width="100" height="36" rx="6" fill="#161b22" stroke="#FFBA00" stroke-width="1"/>
  <text x="550" y="218" fill="#CCCCCC" font-family="Lato, sans-serif" font-size="12" text-anchor="middle">Magnitude</text>

  <!-- Phase Callback -->
  <rect x="500" y="239" width="100" height="36" rx="6" fill="#161b22" stroke="#FFBA00" stroke-width="1"/>
  <text x="550" y="262" fill="#CCCCCC" font-family="Lato, sans-serif" font-size="12" text-anchor="middle">Phase</text>
  <path d="M470,250 L495,257" stroke="#CCCCCC" stroke-width="1.5" marker-end="url(#arrow)" fill="none"/>

  <!-- label for callbacks -->
  <text x="550" y="188" fill="#808080" font-family="Consolas, 'Courier New', monospace" font-size="10" text-anchor="middle">user callbacks</text>

  <!-- Inverse FFT (optional) -->
  <path d="M600,235 L625,235 L625,320 L355,320" stroke="#90FFB1" stroke-width="1.5" marker-end="url(#arrow-green)" fill="none"/>
  <text x="490" y="338" fill="#808080" font-family="Consolas, 'Courier New', monospace" font-size="11" text-anchor="middle">setEnableInverseFFT</text>

  <rect x="220" y="295" width="130" height="50" rx="6" fill="#161b22" stroke="#90FFB1" stroke-width="1.5"/>
  <text x="285" y="318" fill="#CCCCCC" font-family="Lato, sans-serif" font-size="12" font-weight="bold" text-anchor="middle">Inverse FFT</text>
  <text x="285" y="334" fill="#808080" font-family="Lato, sans-serif" font-size="11" text-anchor="middle">(overlap-add)</text>

  <!-- Output Buffer -->
  <path d="M220,320 L85,320 L85,200" stroke="#90FFB1" stroke-width="1.5" marker-end="url(#arrow-green)" fill="none" stroke-dasharray="4,3"/>
  <rect x="30" y="300" width="110" height="40" rx="6" fill="#161b22" stroke="#90FFB1" stroke-width="2"/>
  <text x="85" y="325" fill="#CCCCCC" font-family="Lato, sans-serif" font-size="13" font-weight="bold" text-anchor="middle">Output Buffer</text>

  <!-- Overlap label on callback path -->
  <text x="200" y="198" fill="#808080" font-family="Consolas, 'Courier New', monospace" font-size="11" text-anchor="middle">overlap chunks</text>
</svg>
