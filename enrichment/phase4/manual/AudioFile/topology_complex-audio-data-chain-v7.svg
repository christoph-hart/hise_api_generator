<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 440" role="img" aria-label="Audio file complex data chain variant 7">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#CCCCCC"/></marker>
    <marker id="arr-g" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#90FFB1"/></marker>
    <marker id="arr-t" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#3F6E6E"/></marker>
  </defs>

  <!-- Vertical layout: top-to-bottom flow -->

  <!-- ASP at top -->
  <rect x="210" y="30" width="280" height="60" fill="#161b22" stroke="#7E60B1" stroke-width="2" rx="6"/>
  <text x="350" y="65" font-family="Consolas, monospace" font-size="14" fill="#CCCCCC" text-anchor="middle">AudioSampleProcessor</text>

  <!-- Arrow down to slot array -->
  <path d="M 350 90 L 350 140" fill="none" stroke="#90FFB1" stroke-width="2" marker-end="url(#arr-g)"/>
  <rect x="308" y="106" width="100" height="18" fill="#161b22" fill-opacity="0.88" rx="3"/>
  <text x="358" y="119" font-family="Consolas, monospace" font-size="11" fill="#90FFB1" text-anchor="middle">getAudioFile(i)</text>

  <!-- Slot array as horizontal strip -->
  <rect x="80" y="140" width="540" height="80" fill="#161b22" stroke="#90FFB1" stroke-width="2" rx="6"/>
  <text x="350" y="162" font-family="Lato, sans-serif" font-size="12" font-weight="bold" fill="#90FFB1" text-anchor="middle">AudioFile slots</text>

  <rect x="100" y="174" width="80" height="34" fill="#0d1117" stroke="#90FFB1" stroke-opacity="0.5" rx="4"/>
  <text x="140" y="196" font-family="Consolas, monospace" font-size="12" fill="#808080" text-anchor="middle">[0]</text>

  <rect x="200" y="174" width="80" height="34" fill="#0d1117" stroke="#90FFB1" stroke-opacity="0.5" rx="4"/>
  <text x="240" y="196" font-family="Consolas, monospace" font-size="12" fill="#808080" text-anchor="middle">[1]</text>

  <rect x="300" y="174" width="80" height="34" fill="#0d1117" stroke="#90FFB1" stroke-width="2" rx="4"/>
  <text x="340" y="196" font-family="Consolas, monospace" font-size="12" fill="#90FFB1" text-anchor="middle">[2]</text>

  <rect x="400" y="174" width="80" height="34" fill="#0d1117" stroke="#90FFB1" stroke-opacity="0.5" rx="4"/>
  <text x="440" y="196" font-family="Consolas, monospace" font-size="12" fill="#808080" text-anchor="middle">[3]</text>

  <rect x="500" y="174" width="80" height="34" fill="#0d1117" stroke="#90FFB1" stroke-opacity="0.3" rx="4"/>
  <text x="540" y="196" font-family="Lato, sans-serif" font-size="12" fill="#808080" text-anchor="middle">...</text>

  <!-- Highlight selection on slot 2 -->
  <rect x="298" y="172" width="84" height="38" fill="none" stroke="#3F6E6E" stroke-width="2" stroke-dasharray="3,2" rx="6"/>

  <!-- Arrow down from selected slot to waveform -->
  <path d="M 340 220 L 340 280" fill="none" stroke="#3F6E6E" stroke-width="2" marker-end="url(#arr-t)"/>
  <rect x="348" y="240" width="86" height="18" fill="#161b22" fill-opacity="0.88" rx="3"/>
  <text x="391" y="253" font-family="Consolas, monospace" font-size="11" fill="#3F6E6E" text-anchor="middle">sampleIndex</text>

  <!-- Waveform at bottom -->
  <rect x="210" y="280" width="280" height="60" fill="#161b22" stroke="#3F6E6E" stroke-width="2" rx="6"/>
  <text x="350" y="315" font-family="Consolas, monospace" font-size="14" fill="#CCCCCC" text-anchor="middle">ScriptAudioWaveform</text>

  <!-- processorId: waveform back up to ASP on the side -->
  <path d="M 210 310 L 60 310 L 60 60 L 210 60" fill="none" stroke="#CCCCCC" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr)"/>
  <rect x="18" y="176" width="84" height="18" fill="#161b22" fill-opacity="0.88" rx="3"/>
  <text x="60" y="189" font-family="Consolas, monospace" font-size="11" fill="#CCCCCC" text-anchor="middle">processorId</text>
</svg>
