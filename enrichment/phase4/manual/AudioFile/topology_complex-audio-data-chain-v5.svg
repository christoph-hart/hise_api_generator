<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 400" role="img" aria-label="Audio file complex data chain variant 5">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#CCCCCC"/></marker>
    <marker id="arr-g" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#90FFB1"/></marker>
  </defs>

  <!-- Horizontal flow: left-to-right pipeline with slot fan-out in the middle -->

  <!-- Processor box - tall, left -->
  <rect x="40" y="80" width="180" height="240" fill="#161b22" stroke="#7E60B1" stroke-width="2" rx="6"/>
  <text x="130" y="60" font-family="Lato, sans-serif" font-size="13" font-weight="bold" fill="#7E60B1" text-anchor="middle">AudioSampleProcessor</text>
  <text x="130" y="120" font-family="Consolas, monospace" font-size="12" fill="#CCCCCC" text-anchor="middle">slot 0</text>
  <text x="130" y="170" font-family="Consolas, monospace" font-size="12" fill="#CCCCCC" text-anchor="middle">slot 1</text>
  <text x="130" y="220" font-family="Consolas, monospace" font-size="12" fill="#CCCCCC" text-anchor="middle">slot 2</text>
  <text x="130" y="270" font-family="Consolas, monospace" font-size="12" fill="#808080" text-anchor="middle">...</text>
  <!-- slot dividers -->
  <line x1="50" y1="140" x2="210" y2="140" stroke="#7E60B1" stroke-opacity="0.3" stroke-width="1"/>
  <line x1="50" y1="190" x2="210" y2="190" stroke="#7E60B1" stroke-opacity="0.3" stroke-width="1"/>
  <line x1="50" y1="240" x2="210" y2="240" stroke="#7E60B1" stroke-opacity="0.3" stroke-width="1"/>

  <!-- AudioFile handles fanning out from slots -->
  <rect x="330" y="98" width="150" height="38" fill="#161b22" stroke="#90FFB1" stroke-width="2" rx="6"/>
  <text x="405" y="122" font-family="Consolas, monospace" font-size="13" fill="#90FFB1" text-anchor="middle">AudioFile</text>
  <rect x="330" y="148" width="150" height="38" fill="#161b22" stroke="#90FFB1" stroke-width="2" rx="6"/>
  <text x="405" y="172" font-family="Consolas, monospace" font-size="13" fill="#90FFB1" text-anchor="middle">AudioFile</text>
  <rect x="330" y="198" width="150" height="38" fill="#161b22" stroke="#90FFB1" stroke-width="2" rx="6"/>
  <text x="405" y="222" font-family="Consolas, monospace" font-size="13" fill="#90FFB1" text-anchor="middle">AudioFile</text>

  <!-- slot -> AudioFile arrows -->
  <path d="M 220 120 L 330 117" fill="none" stroke="#90FFB1" stroke-width="1.5" marker-end="url(#arr-g)"/>
  <path d="M 220 170 L 330 167" fill="none" stroke="#90FFB1" stroke-width="1.5" marker-end="url(#arr-g)"/>
  <path d="M 220 220 L 330 217" fill="none" stroke="#90FFB1" stroke-width="1.5" marker-end="url(#arr-g)"/>

  <rect x="236" y="82" width="100" height="18" fill="#161b22" fill-opacity="0.88" rx="3"/>
  <text x="286" y="95" font-family="Consolas, monospace" font-size="11" fill="#90FFB1" text-anchor="middle">getAudioFile(i)</text>

  <!-- UI component - right side, single box -->
  <rect x="620" y="140" width="260" height="60" fill="#161b22" stroke="#3F6E6E" stroke-width="2" rx="6"/>
  <text x="750" y="175" font-family="Consolas, monospace" font-size="14" fill="#CCCCCC" text-anchor="middle">ScriptAudioWaveform</text>

  <!-- processorId: UI -> Processor (bottom path) -->
  <path d="M 750 200 L 750 340 L 130 340 L 130 320" fill="none" stroke="#CCCCCC" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr)"/>
  <rect x="380" y="330" width="86" height="18" fill="#161b22" fill-opacity="0.88" rx="3"/>
  <text x="423" y="343" font-family="Consolas, monospace" font-size="11" fill="#CCCCCC" text-anchor="middle">processorId</text>

  <!-- sampleIndex: UI -> one AudioFile slot (highlighted) -->
  <path d="M 620 170 L 580 170 L 580 167 L 480 167" fill="none" stroke="#3F6E6E" stroke-width="2.2" marker-end="url(#arr)"/>
  <rect x="530" y="146" width="82" height="18" fill="#161b22" fill-opacity="0.88" rx="3"/>
  <text x="571" y="159" font-family="Consolas, monospace" font-size="11" fill="#3F6E6E" text-anchor="middle">sampleIndex</text>

  <!-- highlight selected slot -->
  <rect x="328" y="146" width="154" height="42" fill="none" stroke="#3F6E6E" stroke-width="1.5" stroke-dasharray="3,2" rx="8"/>
</svg>
