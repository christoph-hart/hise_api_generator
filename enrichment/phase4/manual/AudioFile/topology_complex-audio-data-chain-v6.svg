<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 380" role="img" aria-label="Audio file complex data chain variant 6">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#CCCCCC"/></marker>
    <marker id="arr-g" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#90FFB1"/></marker>
    <marker id="arr-t" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#3F6E6E"/></marker>
  </defs>

  <!-- Two-row layout: top row = data chain, bottom row = binding edges -->

  <!-- TOP ROW: the three class boxes in a horizontal line -->
  <rect x="40" y="60" width="220" height="80" fill="#161b22" stroke="#7E60B1" stroke-width="2" rx="6"/>
  <text x="150" y="95" font-family="Consolas, monospace" font-size="14" fill="#CCCCCC" text-anchor="middle">AudioSampleProcessor</text>
  <text x="150" y="115" font-family="Lato, sans-serif" font-size="11" fill="#808080" text-anchor="middle">owns N audio file slots</text>

  <!-- Slot array as a compact row of cells -->
  <rect x="330" y="55" width="260" height="90" fill="#161b22" stroke="#90FFB1" stroke-width="2" rx="6"/>
  <text x="460" y="78" font-family="Consolas, monospace" font-size="14" fill="#90FFB1" text-anchor="middle">AudioFile</text>
  <!-- individual cell boxes inside -->
  <rect x="345" y="92" width="44" height="38" fill="#0d1117" stroke="#90FFB1" stroke-opacity="0.6" rx="4"/>
  <text x="367" y="116" font-family="Consolas, monospace" font-size="11" fill="#90FFB1" text-anchor="middle">0</text>
  <rect x="397" y="92" width="44" height="38" fill="#0d1117" stroke="#90FFB1" stroke-width="2" rx="4"/>
  <text x="419" y="116" font-family="Consolas, monospace" font-size="11" fill="#90FFB1" text-anchor="middle">1</text>
  <rect x="449" y="92" width="44" height="38" fill="#0d1117" stroke="#90FFB1" stroke-opacity="0.6" rx="4"/>
  <text x="471" y="116" font-family="Consolas, monospace" font-size="11" fill="#90FFB1" text-anchor="middle">2</text>
  <rect x="501" y="92" width="44" height="38" fill="#0d1117" stroke="#90FFB1" stroke-opacity="0.3" rx="4"/>
  <text x="523" y="116" font-family="Lato, sans-serif" font-size="11" fill="#808080" text-anchor="middle">...</text>
  <rect x="553" y="92" width="22" height="38" fill="#0d1117" stroke="#90FFB1" stroke-opacity="0.2" rx="4"/>

  <!-- UI component -->
  <rect x="660" y="60" width="220" height="80" fill="#161b22" stroke="#3F6E6E" stroke-width="2" rx="6"/>
  <text x="770" y="95" font-family="Consolas, monospace" font-size="14" fill="#CCCCCC" text-anchor="middle">ScriptAudioWaveform</text>
  <text x="770" y="115" font-family="Lato, sans-serif" font-size="11" fill="#808080" text-anchor="middle">displays one slot</text>

  <!-- Top arrows: ASP -> slots -> UI -->
  <path d="M 260 100 L 330 100" fill="none" stroke="#90FFB1" stroke-width="1.8" marker-end="url(#arr-g)"/>
  <path d="M 590 100 L 660 100" fill="none" stroke="#3F6E6E" stroke-width="1.8" marker-end="url(#arr-t)"/>

  <rect x="270" y="79" width="56" height="16" fill="#161b22" fill-opacity="0.88" rx="3"/>
  <text x="298" y="91" font-family="Consolas, monospace" font-size="10" fill="#90FFB1" text-anchor="middle">1..N</text>

  <!-- BOTTOM ROW: binding edges as labeled arcs -->
  <!-- processorId arc from UI down and left to ASP -->
  <path d="M 770 140 L 770 220 L 150 220 L 150 140" fill="none" stroke="#CCCCCC" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr)"/>
  <rect x="400" y="210" width="86" height="18" fill="#161b22" fill-opacity="0.88" rx="3"/>
  <text x="443" y="223" font-family="Consolas, monospace" font-size="11" fill="#CCCCCC" text-anchor="middle">processorId</text>

  <!-- sampleIndex arc from UI down to specific slot cell -->
  <path d="M 770 140 L 770 280 L 419 280 L 419 130" fill="none" stroke="#3F6E6E" stroke-width="2" marker-end="url(#arr-t)"/>
  <rect x="550" y="270" width="86" height="18" fill="#161b22" fill-opacity="0.88" rx="3"/>
  <text x="593" y="283" font-family="Consolas, monospace" font-size="11" fill="#3F6E6E" text-anchor="middle">sampleIndex</text>

  <!-- Dotted box highlighting the selected cell -->
  <rect x="395" y="90" width="48" height="42" fill="none" stroke="#3F6E6E" stroke-width="1.5" stroke-dasharray="3,2" rx="6"/>
</svg>
