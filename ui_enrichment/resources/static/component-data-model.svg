<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 320">
  <defs>
    <marker id="arrow-green" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <polygon points="0 0, 6 3, 0 6" fill="#90FFB1"/>
    </marker>
    <marker id="arrow-green-rev" markerWidth="8" markerHeight="6" refX="0" refY="3" orient="auto">
      <polygon points="10 0, 0 3, 8 6" fill="#90FFB1"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="860" height="320" fill="#0d1117" rx="8"/>

  <!-- ════════════════════════════════════════════ -->
  <!-- COLUMN 1: XML DATA MODEL -->
  <!-- ════════════════════════════════════════════ -->
  <rect x="20" y="40" width="240" height="240" fill="#6CA6E8" fill-opacity="0.04" stroke="#6CA6E8" stroke-opacity="0.25" rx="6"/>
  <text x="140" y="30" font-family="Lato, sans-serif" font-size="12" font-weight="bold" fill="#6CA6E8" text-anchor="middle">XML DATA MODEL</text>

  <!-- XML snippet -->
  <rect x="36" y="60" width="208" height="100" fill="#161b22" stroke="rgba(0,0,0,0.5)" rx="5"/>
  <text x="48" y="80" font-family="Consolas, monospace" font-size="10" fill="#6CA6E8">&lt;ContentProperties&gt;</text>
  <text x="60" y="98" font-family="Consolas, monospace" font-size="10" fill="#CCCCCC">&lt;Component</text>
  <text x="72" y="114" font-family="Consolas, monospace" font-size="10" fill="#808080">type="ScriptSlider"</text>
  <text x="72" y="130" font-family="Consolas, monospace" font-size="10" fill="#808080">id="Vol" value="0.5"</text>
  <text x="72" y="146" font-family="Consolas, monospace" font-size="10" fill="#808080">x="10" saveInPreset="1"/&gt;</text>

  <!-- Properties label -->
  <rect x="36" y="176" width="98" height="30" fill="#161b22" stroke="#6CA6E8" stroke-opacity="0.2" rx="4"/>
  <text x="85" y="196" font-family="Lato, sans-serif" font-size="11" fill="#6CA6E8" text-anchor="middle">Properties</text>

  <!-- Values label -->
  <rect x="146" y="176" width="98" height="30" fill="#161b22" stroke="#6CA6E8" stroke-opacity="0.2" rx="4"/>
  <text x="195" y="196" font-family="Lato, sans-serif" font-size="11" fill="#6CA6E8" text-anchor="middle">Values</text>

  <!-- Persistent annotation -->
  <text x="140" y="236" font-family="Lato, sans-serif" font-size="10" fill="#6CA6E8" fill-opacity="0.5" text-anchor="middle">persistent</text>

  <!-- ════════════════════════════════════════════ -->
  <!-- COLUMN 2: SCRIPT LAYER (overlays the data model) -->
  <!-- ════════════════════════════════════════════ -->

  <!-- Overlay indicator: dashed bracket connecting columns 1 and 2 -->
  

  <rect x="310" y="40" width="240" height="240" fill="#90FFB1" fill-opacity="0.04" stroke="#90FFB1" stroke-opacity="0.25" rx="6"/>
  <text x="430" y="30" font-family="Lato, sans-serif" font-size="12" font-weight="bold" fill="#90FFB1" text-anchor="middle">SCRIPT LAYER</text>

  <!-- onInit box -->
  <rect x="326" y="60" width="208" height="44" fill="#161b22" stroke="rgba(0,0,0,0.5)" rx="5"/>
  <text x="430" y="78" font-family="Lato, sans-serif" font-size="10" fill="#90FFB1" text-anchor="middle">onInit</text>
  <text x="430" y="95" font-family="Lato, sans-serif" font-size="10" fill="#808080" text-anchor="middle">create + attach logic</text>

  <!-- Callbacks box -->
  <rect x="326" y="118" width="208" height="44" fill="#161b22" stroke="rgba(0,0,0,0.5)" rx="5"/>
  <text x="430" y="136" font-family="Lato, sans-serif" font-size="10" fill="#90FFB1" text-anchor="middle">Callbacks</text>
  <text x="430" y="153" font-family="Consolas, monospace" font-size="8" fill="#808080" text-anchor="middle">onControl, setPaintRoutine, onTimerCallback</text>

  <!-- Post-processor annotation -->
  <text x="430" y="196" font-family="Lato, sans-serif" font-size="10" fill="#90FFB1" fill-opacity="0.5" text-anchor="middle">post-processor:</text>
  <text x="430" y="210" font-family="Lato, sans-serif" font-size="10" fill="#90FFB1" fill-opacity="0.5" text-anchor="middle">modifies properties / values</text>
  <text x="430" y="236" font-family="Lato, sans-serif" font-size="10" fill="#90FFB1" fill-opacity="0.5" text-anchor="middle">adds logic / rendering code</text>

  <!-- ════════════════════════════════════════════ -->
  <!-- COLUMN 3: UI COMPONENTS (what the user sees) -->
  <!-- ════════════════════════════════════════════ -->
  <rect x="600" y="40" width="240" height="240" fill="#E8A85C" fill-opacity="0.04" stroke="#E8A85C" stroke-opacity="0.25" rx="6"/>
  <text x="720" y="30" font-family="Lato, sans-serif" font-size="12" font-weight="bold" fill="#E8A85C" text-anchor="middle">UI COMPONENTS</text>

  <!-- Generic component boxes -->
  <rect x="616" y="60" width="208" height="34" fill="#161b22" stroke="#E8A85C" stroke-opacity="0.15" rx="5"/>
  <text x="720" y="82" font-family="Lato, sans-serif" font-size="11" fill="#CCCCCC" text-anchor="middle">Main Interface Panel</text>

  <rect x="632" y="108" width="176" height="30" fill="#161b22" stroke="#E8A85C" stroke-opacity="0.15" rx="5"/>
  <text x="720" y="128" font-family="Lato, sans-serif" font-size="11" fill="#CCCCCC" text-anchor="middle">Knob</text>

  <rect x="632" y="150" width="176" height="30" fill="#161b22" stroke="#E8A85C" stroke-opacity="0.15" rx="5"/>
  <text x="720" y="170" font-family="Lato, sans-serif" font-size="11" fill="#CCCCCC" text-anchor="middle">Button</text>

  <rect x="632" y="192" width="176" height="30" fill="#161b22" stroke="#E8A85C" stroke-opacity="0.15" rx="5"/>
  <text x="720" y="212" font-family="Lato, sans-serif" font-size="11" fill="#CCCCCC" text-anchor="middle">Panel</text>

  <!-- Visual output annotation -->
  <text x="720" y="248" font-family="Lato, sans-serif" font-size="10" fill="#E8A85C" fill-opacity="0.5" text-anchor="middle">visual rendering</text>

  <!-- ════════════════════════════════════════════ -->
  <!-- ARROWS -->
  <!-- ════════════════════════════════════════════ -->

  <!-- Data Model -> Script -->
  <path d="M 260 105 L 308 105" fill="none" stroke="#90FFB1" stroke-width="1.5" marker-end="url(#arrow-green)"/>

  <!-- onInit -> Data Model (add components, modify properties) -->
  <path d="M 308 80 L 262 80" fill="none" stroke="#90FFB1" stroke-width="1.5" marker-end="url(#arrow-green)"/>

  <!-- onInit -> UI Components -->
  <path d="M 550 82 L 597 82" fill="none" stroke="#90FFB1" stroke-width="1.5" marker-end="url(#arrow-green)"/>

  <!-- Callbacks -> UI Components -->
  <path d="M 550 140 L 597 140" fill="none" stroke="#90FFB1" stroke-width="1.5" marker-end="url(#arrow-green)"/>
</svg>
